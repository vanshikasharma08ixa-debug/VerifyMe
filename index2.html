<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address & Income</title>
    <link rel="stylesheet" href="bootstrap.css">
</head>
<body style="background-color: rgb(175,255,175);">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <h2 style="color: rgb(2, 82, 2);text-align: center;">VerifyMe</h2>
            <p style="text-align: center;">Open your account - it takes about 3 minutes</p>
            <div class="card p-4" style="max-width: 700px;">
                <div class="d-flex justify-content-between align-items-center">
                    <span>1 . IDENTITY</span>
                    <span class="text-success">2 . ADDRESS & INCOME</span>
                    <span>3 . DOCUMENTS</span>
                </div>
                <div class="progress mb-4" style="height:8px">
                    <div class="progress-bar" style="width:76%;background-color:green"></div>
                </div>
                <div class="form-group mb-3">
                  <label class="form-label">State</label>
                  <select class="form-select">
                    <option selected>Select State</option>
                    <option>Andhra Pradesh</option>
                    <option>Delhi</option>
                    <option>Gujarat</option>
                    <option>Haryana</option>
                    <option>Karnataka</option>
                    <option>Maharashtra</option>
                    <option>Punjab</option>
                    <option>Rajasthan</option>
                    <option>Tamil Nadu</option>
                    <option>Uttar Pradesh</option> 
                  </select>
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Residential Address</label>
                    <textarea class="form-control" placeholder="Address"></textarea>
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Approx. Annual Income</label>
                    <input type="range" class="form-range" min="100000" max="5000000" step="100000">
                    <div class="d-flex justify-content-between text-muted small mb-4">
                          <span>₹1 Lakh</span>
                          <span>₹50 Lakh</span>
  
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <button class="btn btn-outline-secondary"><a href="index1.html" style="color:black;text-decoration:none;">Back</a></button>
                    <button class="btn btn-success"><a href="index3.html" style="color:white;text-decoration: none;">Continue</a></button>
                </div>
            </div>
                <footer style="text-align: center;margin-top: 20px;">
                <p>Bank-grade encryption . your data is never sold</p>
               </footer>
        </div>       
    </div>
</body>
</html>
