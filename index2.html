<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents</title>
    <link rel="stylesheet" href="bootstrap.css">
</head>
<body style="background-color: rgb(175,255,175);">
  <div class="container mt-5">
    <div class="row justify-content-center">
        <h2 style="color:rgb(2, 82, 2);text-align: center;">VerifyMe</h2>
        <p style="text-align: center;">Open your account - it takes about 3 minutes</p>
        <div class="card p-4" style="max-width:700px;">
            <div class="d-flex justify-content-between align-items-center">
                <span>1 . IDENTITY</span>
                <span>2 . ADDRESS & INCOME</span>
                <span class="text-success">3 . DOCUMENTS</span>
            </div>
            <div class="progress mb-4" style="height:8px">
                    <div class="progress-bar" style="width:100%;background-color:green"></div>
            </div>
            <div class="form-group mb-3">
                <label class="form-label">Upload Documents</label>
                <input type="file" class="form-control">
            </div>
            <label class="form-label">Select ID Proof</label>
            <div class="form-check mb-3">
                <input type="radio" class="form-check-input"name="id" id="aadhar">
                <label class="form-check-label" for="aadhar">Aadhar Card</label>
            </div>
            <div class="form-check mb-3">
                <input type="radio" class="form-check-input" name="id" id="passport">
                <label class="form-check-label" for="passport">Passport</label>
            </div>
            <div class="form-check mb-3">
                <input type="radio" class="form-check-input" name="id" id="license">
                <label class="form-check-label" for="license">Driving License</label>
            </div>
            
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="agree">
                <label class="form-check-label" for="agree">I agree to the terms & conditions</label>
            </div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="marketing">
                <label class="form-check-label" for="marketing">Recieve updates and promotional offers</label>
            </div>
            <div class="d-flex justify-content-between">
             <button class="btn btn-outline-secondary"><a href="index1.html" style="color:black; text-decoration: none;">Back</a></button>
             <button class="btn btn-success">Review</button>
            </div>
        </div>    
            <footer style="text-align: center;margin-top: 20px;">
                <p>Bank-grade encryption . your data is never sold</p>
            </footer>
        
    </div>
  </div>
</body>
</html>
